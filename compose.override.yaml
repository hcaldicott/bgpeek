# Local development overrides — picked up automatically by `docker compose up`.
# Reasons this is separate from compose.yaml:
#   - bind-mount src/ for live reload
#   - uvicorn --reload
#   - expose postgres/redis on host (for psql/redis-cli/Adminer)
#   - dev passwords (clearly marked)
#
# This file is committed because it has no secrets and benefits all contributors.
# For personal tweaks, use compose.local.yaml + COMPOSE_FILE env var.

services:
  postgres:
    ports:
      - "15432:5432"
    environment:
      POSTGRES_PASSWORD: bgpeek-dev  # local-only, never use in prod

  redis:
    ports:
      - "16379:6379"

  bgpeek:
    build:
      target: builder       # stop before runtime stage — keeps uv and build tools
    command:
      - sh
      - -c
      - |
        uv sync --frozen --extra dev &&
        uv run uvicorn bgpeek.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    environment:
      BGPEEK_DEBUG: "true"
      BGPEEK_DATABASE_URL: "postgresql://bgpeek:bgpeek-dev@postgres:5432/bgpeek"
      UV_PROJECT_ENVIRONMENT: /opt/venv
      PATH: /opt/venv/bin:/usr/local/bin:/usr/bin:/bin

  # --- Dev-only helpers ---
  adminer:
    image: adminer:5
    ports:
      - "18080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
