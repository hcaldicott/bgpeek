# bandit configuration — see https://bandit.readthedocs.io/
#
# We run with `bandit -c bandit.yaml -ll -r src/` in nightly Security CI.
# `-ll` floors at MEDIUM (drops the LOW i18n/auth-mask noise that bandit
# can't tell apart from real secrets). `skips` removes whole rule classes
# that produce only false positives in this codebase. Targeted, real-but-
# safe MEDIUM hits are silenced inline with `# nosec <rule>` plus a why.

skips:
  # B105/B106 fire on string literals like "Password", "bearer", "****" —
  # those are i18n values, OAuth scheme names, and password masks, not
  # credentials. We have no actual hardcoded secrets in src/.
  - B105
  - B106
  # B608 ("string-based query construction") matches our asyncpg queries
  # built with $1/$2 positional placeholders, which bandit can't recognize
  # as parameterized. Real interpolation is forbidden by code review.
  - B608
