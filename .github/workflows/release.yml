name: Release

on:
  push:
    tags: ['v*']

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Generate release notes
        run: |
          echo "## What's new" > notes.md
          echo "" >> notes.md
          echo "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details." >> notes.md
          echo "" >> notes.md
          echo "## Install" >> notes.md
          echo "" >> notes.md
          echo '```bash' >> notes.md
          echo "# Docker" >> notes.md
          echo "docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> notes.md
          echo "" >> notes.md
          echo "# pip" >> notes.md
          echo "pip install bgpeek" >> notes.md
          echo '```' >> notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          generate_release_notes: true

