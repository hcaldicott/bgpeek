name: Dependabot auto-merge

# Auto-merges safe dependabot PRs after CI passes:
#   - patch updates (1.2.3 -> 1.2.4)
#   - minor updates for GitHub Actions
#   - minor updates for dev-only Python dependencies
#
# Major updates and runtime dependency minors still require manual review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for GitHub Actions minor bumps
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-minor'
          && steps.meta.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for dev-only minor bumps
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-minor'
          && contains(steps.meta.outputs.dependency-type, 'development')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
