name: Security

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8 AM
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev
      # CVE-2026-3219 affects pip 26.0.1 with no fix available upstream;
      # bgpeek does not invoke pip at runtime, so the audit is not actionable yet.
      # Drop the ignore once a fixed pip lands.
      - run: uv run pip-audit --ignore-vuln CVE-2026-3219
      - run: uv run bandit -r src/
