name: Security

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8 AM
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run pip-audit
      - run: uv run bandit -r src/
