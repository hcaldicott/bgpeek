<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}bgpeek{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <span class="text-2xl font-bold tracking-tight">bgpeek</span>
                <span class="text-xs text-slate-500 mt-1">v{{ version }}</span>
            </a>
            <nav class="text-sm text-slate-600 flex gap-4">
                <a href="/api/docs" class="hover:text-slate-900">API</a>
                <a href="https://github.com/xeonerix/bgpeek" class="hover:text-slate-900">GitHub</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-xs text-slate-500 py-8">
        Open-source looking glass &middot; Apache-2.0
    </footer>
</body>
</html>
