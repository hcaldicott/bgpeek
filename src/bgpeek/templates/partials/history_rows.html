{% for row in results %}
<tr class="border-t border-slate-200 dark:border-slate-700
           {% if loop.index is odd %}bg-white dark:bg-slate-900{% else %}bg-slate-50 dark:bg-slate-800/50{% endif %}
           hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors">
    <td class="px-4 py-2.5 whitespace-nowrap text-slate-500 dark:text-slate-400 text-xs tabular-nums">
        {{ row.created_at | timeago }}
    </td>
    <td class="px-4 py-2.5 whitespace-nowrap font-medium text-slate-900 dark:text-slate-100">
        {{ row.device_name }}
    </td>
    <td class="px-4 py-2.5 whitespace-nowrap">
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                     bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300">
            {{ row.query_type }}
        </span>
    </td>
    <td class="px-4 py-2.5 whitespace-nowrap font-mono text-sm text-slate-700 dark:text-slate-300">
        {{ row.target }}
    </td>
    <td class="px-4 py-2.5 whitespace-nowrap text-right text-xs tabular-nums text-slate-500 dark:text-slate-400">
        {% if row.runtime_ms is not none %}{{ row.runtime_ms }} ms{% else %}&mdash;{% endif %}
    </td>
    <td class="px-4 py-2.5 whitespace-nowrap text-center">
        {% if row.cached %}
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                     bg-amber-100 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300">
            cached
        </span>
        {% else %}
        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                     bg-emerald-100 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-300">
            live
        </span>
        {% endif %}
    </td>
    <td class="px-4 py-2.5 whitespace-nowrap text-right">
        <div class="flex items-center justify-end gap-2">
            <a href="/result/{{ row.id }}"
               class="text-xs font-medium text-slate-600 dark:text-slate-400
                      hover:text-slate-900 dark:hover:text-white transition-colors">
                View
            </a>
            <button type="button"
                    onclick="navigator.clipboard.writeText(window.location.origin+'/result/{{ row.id }}').then(function(){this.textContent='Copied!';var b=this;setTimeout(function(){b.textContent='Share'},1500)}.bind(this))"
                    class="text-xs font-medium text-slate-500 dark:text-slate-400
                           hover:text-slate-900 dark:hover:text-white transition-colors">
                Share
            </button>
        </div>
    </td>
</tr>
{% endfor %}
{% if has_more %}
<tr id="load-more-row">
    <td colspan="7" class="px-4 py-3 text-center">
        <button hx-get="/history?offset={{ next_offset }}&partial=1"
                hx-target="#load-more-row"
                hx-swap="outerHTML"
                class="inline-flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium
                       text-slate-600 dark:text-slate-400
                       border border-slate-300 dark:border-slate-600
                       hover:bg-slate-100 dark:hover:bg-slate-700
                       transition-colors">
            <span class="htmx-indicator">
                <svg class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </span>
            Load more
        </button>
    </td>
</tr>
{% endif %}
