services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bgpeek}
      POSTGRES_USER: ${POSTGRES_USER:-bgpeek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bgpeek}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bgpeek:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      BGPEEK_HOST: "0.0.0.0"
      BGPEEK_PORT: "8000"
      BGPEEK_DATABASE_URL: "postgresql://${POSTGRES_USER:-bgpeek}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-bgpeek}"
      BGPEEK_REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ${BGPEEK_KEYS_DIR:-./secrets}:/etc/bgpeek/keys:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
